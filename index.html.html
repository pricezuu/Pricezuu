<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealAlert — Price Tracker HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --accent3: #5b8dee;
    --warn: #ffcc00;
    --danger: #ff4757;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky; top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1400px; margin: 0 auto; padding: 0 24px;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-stats {
    display: flex; gap: 24px; align-items: center;
  }

  .hstat {
    text-align: center;
  }

  .hstat-val {
    font-family: var(--font-mono);
    font-size: 20px; font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .hstat-label {
    font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    margin-top: 2px;
  }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }

  .last-updated {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--muted);
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 13px; font-weight: 600;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .spin { display: inline-block; }
  .spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CONTROLS BAR ── */
  .controls {
    padding: 16px 0;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }

  .search-box {
    flex: 1; min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-pills {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .pill {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--accent3); color: var(--accent3); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #000; }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .view-btn {
    padding: 8px 12px;
    background: var(--surface);
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.15s;
  }

  .view-btn.active { background: var(--accent3); color: white; }

  /* ── ALERT BANNER ── */
  .alert-banner {
    background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,204,0,0.1));
    border: 1px solid rgba(255,107,53,0.4);
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }

  .alert-pulse {
    width: 10px; height: 10px;
    background: var(--accent2);
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.6); }
    50% { box-shadow: 0 0 0 8px rgba(255,107,53,0); }
  }

  .alert-text { font-size: 13px; }
  .alert-text strong { color: var(--accent2); }

  /* ── PRODUCT GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding-bottom: 40px;
  }

  .product-grid.list-view {
    grid-template-columns: 1fr;
  }

  /* ── PRODUCT CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
  }

  .card:hover { border-color: rgba(91,141,238,0.5); transform: translateY(-2px); }

  .card.deal-active {
    border-color: rgba(0,255,136,0.5);
    box-shadow: 0 0 20px rgba(0,255,136,0.08);
  }

  .card.deal-active::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .card-header {
    padding: 14px 16px 10px;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px;
  }

  .card-cat {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); font-family: var(--font-mono);
  }

  .priority-badge {
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }

  .priority-high { background: rgba(255,71,87,0.2); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }
  .priority-medium { background: rgba(91,141,238,0.2); color: var(--accent3); border: 1px solid rgba(91,141,238,0.3); }
  .priority-low { background: rgba(107,107,138,0.2); color: var(--muted); border: 1px solid rgba(107,107,138,0.2); }

  .card-body { padding: 0 16px 14px; }

  .product-name {
    font-size: 15px; font-weight: 700; line-height: 1.3;
    margin-bottom: 12px;
  }

  .tiers {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 12px;
  }

  .tier-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--surface2);
    position: relative; overflow: hidden;
  }

  .tier-row.has-deal {
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
  }

  .tier-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; font-family: var(--font-mono);
    width: 18px; flex-shrink: 0;
  }

  .t1 { color: var(--accent3); }
  .t2 { color: var(--accent); }

  .tier-brand {
    flex: 1; font-size: 12px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .tier-prices {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }

  .price-current {
    font-family: var(--font-mono);
    font-size: 14px; font-weight: 700;
    color: var(--text);
  }

  .price-current.deal { color: var(--accent); }

  .price-was {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-decoration: line-through;
  }

  .deal-pct {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px;
    background: rgba(0,255,136,0.2);
    color: var(--accent);
  }

  .retailer-tag {
    font-size: 9px; color: var(--muted);
    font-family: var(--font-mono);
    background: var(--bg);
    padding: 2px 6px; border-radius: 3px;
    flex-shrink: 0;
  }

  /* Price history sparkline */
  .sparkline-wrap {
    margin-bottom: 10px;
  }

  .sparkline-label {
    font-size: 9px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; font-family: var(--font-mono);
    margin-bottom: 4px;
  }

  .sparkline {
    height: 32px; width: 100%;
  }

  .card-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }

  .specs-text {
    font-size: 10px; color: var(--muted);
    font-family: var(--font-mono);
    flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-actions {
    display: flex; gap: 6px;
  }

  .btn-action {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    font-family: var(--font-display);
    font-size: 11px; font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-post {
    background: var(--accent);
    color: #000;
  }

  .btn-post:hover { background: #00cc70; }

  .btn-post:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
  }

  .btn-track {
    background: var(--surface2);
    color: var(--accent3);
    border: 1px solid var(--border);
  }

  .btn-track:hover { border-color: var(--accent3); }

  /* Deal badge on card */
  .deal-tag {
    position: absolute; top: 10px; right: 10px;
    background: var(--accent);
    color: #000;
    font-size: 9px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
    animation: flash 2s ease-in-out infinite;
  }

  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 0 12px;
  }

  .section-title {
    font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted);
  }

  .section-line {
    flex: 1; height: 1px; background: var(--border);
  }

  .section-count {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px; border-radius: 4px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%; max-width: 520px;
    max-height: 80vh; overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-size: 20px; font-weight: 800; margin-bottom: 6px;
  }

  .modal-sub {
    font-size: 13px; color: var(--muted); margin-bottom: 24px;
    font-family: var(--font-mono);
  }

  .post-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 14px; line-height: 1.7;
    white-space: pre-wrap;
    font-family: var(--font-mono);
    margin-bottom: 20px;
    color: var(--text);
  }

  .modal-actions {
    display: flex; gap: 10px;
  }

  .btn-full {
    flex: 1; padding: 12px;
    border-radius: 8px;
    border: none;
    font-family: var(--font-display);
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-copy { background: var(--accent); color: #000; }
  .btn-copy:hover { background: #00cc70; }
  .btn-close { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-close:hover { border-color: var(--muted); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
    grid-column: 1 / -1;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty-text { font-size: 14px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent);
    color: #000;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 700; font-size: 13px;
    z-index: 300;
    transform: translateY(80px);
    transition: transform 0.3s;
    font-family: var(--font-mono);
  }

  .toast.show { transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 640px) {
    .header-stats { display: none; }
    .product-grid { grid-template-columns: 1fr; }
    .filter-pills { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
  }
</style>
</head>

<header>

    <div class="logo">
      <div class="logo-icon">🛒</div>
      <div class="logo-text">Deal<span>Alert</span> HQ</div>
    </div>
    <div class="header-stats">
      <div class="hstat">
        <div class="hstat-val" id="stat-total">0</div>
        <div class="hstat-label">Tracked</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="stat-deals" style="color:var(--accent2)">0</div>
        <div class="hstat-label">Live Deals</div>
      </div>
      <div class="hstat">

        <div class="hstat-label">Categories</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="stat-savings" style="color:var(--warn)">€0</div>
        <div class="hstat-label">Best Save</div>

    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated">Last checked: --</span>
      <button class="refresh-btn" onclick="refreshPrices()">
        <span class="spin" id="spin-icon">⟳</span> Refresh Prices
      </button>
    </div>
  </div>
</header>

<div class="wrapper">
  <div class="controls">
    <input class="search-box" type="text" placeholder="🔍  Search products, brands..." id="search-input" oninput="filterProducts()">
    <div class="filter-pills" id="filter-pills"></div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grid view">⊞</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')" title="List view">☰</button>
    </div>
  </div>

  <div class="alert-banner" id="alert-banner" style="display:none">
    <div class="alert-pulse"></div>
    <div class="alert-text" id="alert-text"></div>
  </div>

  <div class="product-grid" id="product-grid"></div>
</div>

<!-- Post Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">📢 Post This Deal</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="post-preview" id="post-preview"></div>
    <div class="modal-actions">
      <button class="btn-full btn-copy" onclick="copyPost()">📋 Copy for Telegram/Instagram</button>
      <button class="btn-full btn-close" onclick="closeModalDirect()">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let priceData = {};
let activeFilter = "All";
let currentView = "grid";
let currentPostProduct = null;

// ── SIMULATE PRICE DATA ───────────────────────────────────────────────────────
function generatePriceData(product) {
  const base1 = (Math.random() * 25 + 8).toFixed(2);
  const base2 = (parseFloat(base1) * (0.6 + Math.random() * 0.25)).toFixed(2);
  const avg1  = (parseFloat(base1) * (1 + Math.random() * 0.2)).toFixed(2);
  const avg2  = (parseFloat(base2) * (1 + Math.random() * 0.2)).toFixed(2);
  const drop1 = ((avg1 - base1) / avg1 * 100).toFixed(0);
  const drop2 = ((avg2 - base2) / avg2 * 100).toFixed(0);
  const isDeal1 = drop1 >= product.alert;
  const isDeal2 = drop2 >= product.alert;

  // Generate 8-week history
  const hist1 = [], hist2 = [];
  for (let i = 0; i < 8; i++) {
    hist1.push((parseFloat(avg1) * (0.85 + Math.random() * 0.3)).toFixed(2));
    hist2.push((parseFloat(avg2) * (0.85 + Math.random() * 0.3)).toFixed(2));
  }
  hist1[7] = base1; hist2[7] = base2;

  return { base1, base2, avg1, avg2, drop1, drop2, isDeal1, isDeal2, hist1, hist2 };
}

function initPrices() {
  PRODUCTS.forEach(p => { priceData[p.id] = generatePriceData(p); });
}

// ── SPARKLINE SVG ─────────────────────────────────────────────────────────────
function sparkline(prices, color) {
  const vals = prices.map(Number);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const W = 200, H = 28, pad = 2;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (W - 2 * pad);
    const y = pad + (1 - (v - min) / range) * (H - 2 * pad);
    return `${x},${y}`;
  }).join(' ');
  return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <circle cx="${pts.split(' ').pop().split(',')[0]}" cy="${pts.split(' ').pop().split(',')[1]}" r="3" fill="${color}"/>
  </svg>`;
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────────
function getCategories() {
  const cats = ["All", ...new Set(PRODUCTS.map(p => p.cat))];
  return cats;
}

function renderPills() {
  const pills = document.getElementById('filter-pills');
  pills.innerHTML = getCategories().map(cat => `
    <button class="pill ${cat === activeFilter ? 'active' : ''}" onclick="setFilter('${cat.replace(/'/g,"\\'")}')">
      ${cat}
    </button>`).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderPills();
  renderCards();
}

function setView(v) {
  currentView = v;
  document.getElementById('product-grid').className = `product-grid${v === 'list' ? ' list-view' : ''}`;
  document.getElementById('btn-grid').className = `view-btn${v === 'grid' ? ' active' : ''}`;
  document.getElementById('btn-list').className = `view-btn${v === 'list' ? ' active' : ''}`;
}

function filterProducts() {
  renderCards();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return PRODUCTS.filter(p => {
    const matchCat = activeFilter === 'All' || p.cat === activeFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.tier1.toLowerCase().includes(q) || p.tier2.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function renderCards() {
  const grid = document.getElementById('product-grid');
  const filtered = getFiltered();

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">No products found</div>
      <div class="empty-text">Try a different search or category filter</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => renderCard(p)).join('');
  updateStats();
}

function renderCard(p) {
  const d = priceData[p.id];
  const hasAnyDeal = d.isDeal1 || d.isDeal2;
  const priorityClass = `priority-${p.priority.toLowerCase()}`;
  const priorityLabel = p.priority === 'High' ? '🔥 HIGH' : p.priority === 'Medium' ? '◈ MED' : '· LOW';

  const bestSave = Math.max(parseFloat(d.drop1), parseFloat(d.drop2));

  return `<div class="card ${hasAnyDeal ? 'deal-active' : ''}" data-id="${p.id}">
    ${hasAnyDeal ? `<div class="deal-tag">DEAL -${bestSave}%</div>` : ''}
    <div class="card-header">
      <div class="card-cat">${p.cat}</div>
      <div class="priority-badge ${priorityClass}">${priorityLabel}</div>
    </div>
    <div class="card-body">
      <div class="product-name">${p.name}</div>
      <div class="sparkline-wrap">
        <div class="sparkline-label">8-week price trend (T1)</div>
        ${sparkline(d.hist1, d.isDeal1 ? '#00ff88' : '#5b8dee')}
      </div>
      <div class="tiers">
        <div class="tier-row ${d.isDeal1 ? 'has-deal' : ''}">
          <span class="tier-label t1">T1</span>
          <span class="tier-brand" title="${p.tier1}">${p.tier1}</span>
          <div class="tier-prices">
            ${d.isDeal1 ? `<span class="price-was">€${d.avg1}</span>` : ''}
            <span class="price-current ${d.isDeal1 ? 'deal' : ''}">€${d.base1}</span>
            ${d.isDeal1 ? `<span class="deal-pct">-${d.drop1}%</span>` : ''}
          </div>
          <span class="retailer-tag">${p.retailer1}</span>
        </div>
        <div class="tier-row ${d.isDeal2 ? 'has-deal' : ''}">
          <span class="tier-label t2">T2</span>
          <span class="tier-brand" title="${p.tier2}">${p.tier2}</span>
          <div class="tier-prices">
            ${d.isDeal2 ? `<span class="price-was">€${d.avg2}</span>` : ''}
            <span class="price-current ${d.isDeal2 ? 'deal' : ''}">€${d.base2}</span>
            ${d.isDeal2 ? `<span class="deal-pct">-${d.drop2}%</span>` : ''}
          </div>
          <span class="retailer-tag">${p.retailer2}</span>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="specs-text">📐 ${p.specs}</span>
      <div class="card-actions">
        <button class="btn-action btn-track" onclick="showHistory(${p.id})">📊</button>
        <button class="btn-action btn-post" ${!hasAnyDeal ? 'disabled' : ''} onclick="openPostModal(${p.id})">
          ${hasAnyDeal ? '📢 Post Deal' : 'No deal yet'}
        </button>
      </div>
    </div>
  </div>`;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = PRODUCTS.length;
  const deals = PRODUCTS.filter(p => priceData[p.id].isDeal1 || priceData[p.id].isDeal2).length;
  const savings = Math.max(...PRODUCTS.map(p => Math.max(parseFloat(priceData[p.id].drop1), parseFloat(priceData[p.id].drop2))));
  const bestProduct = PRODUCTS.find(p => parseFloat(priceData[p.id].drop1) === savings || parseFloat(priceData[p.id].drop2) === savings);
  const bestPrice = bestProduct ? Math.min(parseFloat(priceData[bestProduct.id].base1), parseFloat(priceData[bestProduct.id].base2)) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-deals').textContent = deals;
  document.getElementById('stat-savings').textContent = `€${(bestPrice * savings / 100).toFixed(0)}`;

  // Alert banner
  if (deals > 0) {
    const dealProducts = PRODUCTS.filter(p => priceData[p.id].isDeal1 || priceData[p.id].isDeal2);
    const topDeal = dealProducts[0];
    const d = priceData[topDeal.id];
    const pct = Math.max(parseFloat(d.drop1), parseFloat(d.drop2));
    document.getElementById('alert-banner').style.display = 'flex';
    document.getElementById('alert-text').innerHTML = `<strong>${deals} live deals detected</strong> — Top pick: <strong>${topDeal.name}</strong> is down <strong>${pct}%</strong> from its 90-day average. Ready to post.`;
  }
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
function refreshPrices() {
  const icon = document.getElementById('spin-icon');
  icon.classList.add('spinning');
  document.getElementById('last-updated').textContent = 'Checking prices...';

  setTimeout(() => {
    initPrices();
    renderCards();
    icon.classList.remove('spinning');
    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Last checked: ${now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}`;
    showToast('✓ Prices refreshed — ' + PRODUCTS.filter(p => priceData[p.id].isDeal1 || priceData[p.id].isDeal2).length + ' deals found');
  }, 1800);
}

// ── POST MODAL ────────────────────────────────────────────────────────────────
function openPostModal(id) {
  const p = PRODUCTS.find(x => x.id === id);
  const d = priceData[id];
  currentPostProduct = p;

  const isDeal1 = d.isDeal1, isDeal2 = d.isDeal2;
  const brand = isDeal1 ? p.tier1 : p.tier2;
  const price = isDeal1 ? d.base1 : d.base2;
  const was   = isDeal1 ? d.avg1  : d.avg2;
  const pct   = isDeal1 ? d.drop1 : d.drop2;
  const store = isDeal1 ? p.retailer1 : p.retailer2;

  const post = `🚨 DEAL ALERT — ${p.name.toUpperCase()}

${p.cat} | Save ${pct}% today

✅ ${brand}
💰 NOW: €${price} (was €${was})
🏪 Where: ${store}
📦 ${p.specs}

⚡ This is ${pct}% below its 90-day average price — grab it before it goes back up!

🔗 Link in bio / check pinned post

━━━━━━━━━━━━━━━
📲 Follow @DealAlertES for daily savings on essentials
#deals #savings #${p.cat.replace(/[^\w]/g,'')} #bargain #ofertas`;

  document.getElementById('modal-sub').textContent = `${p.name} · -${pct}% · ${store}`;
  document.getElementById('post-preview').textContent = post;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}

function copyPost() {
  const text = document.getElementById('post-preview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ Copied to clipboard — ready to paste!');
    closeModalDirect();
  });
}

function showHistory(id) {
  showToast('📊 Full price history charts coming in Phase 2');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
initPrices();
renderPills();
renderCards();

const now = new Date();
document.getElementById('last-updated').textContent =
  `Last checked: ${now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}`;
</script>
